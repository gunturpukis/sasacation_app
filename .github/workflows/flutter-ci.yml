name: Flutter CI/CD

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  flutter_ci:
    name: Build & Test Flutter
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout source code dari repositori
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Setup Java Environment (Diperlukan untuk Android build)
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # 3. Setup Flutter SDK
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x' # Menggunakan versi 3 stabil terbaru, atau sesuaikan dengan fvm/versi spesifikmu
        channel: 'stable'
        cache: true # Mengaktifkan cache agar proses build berikutnya lebih cepat

    # 4. Ambil dependencies (pub get)
    - name: Install Dependencies
      run: flutter pub get

    # 5. Cek format dan kualitas kode (Linting)
    - name: Analyze Code
      run: flutter analyze

    # 6. Jalankan Unit Test & Widget Test
    - name: Run Tests
      run: flutter test

    # 7. Build APK (Simulasi build untuk memastikan tidak ada error compile)
    - name: Build Android APK
      run: flutter build apk --debug # Gunakan --debug untuk sekadar tes CI, atau --release jika untuk CD

    # 8. Upload Hasil APK ke GitHub Actions (Opsional)
    # Ini berguna agar kamu bisa download APK-nya langsung dari halaman GitHub
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: build/app/outputs/flutter-apk/app-debug.apk